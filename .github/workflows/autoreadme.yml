name: AI Auto-README
on:
  push:
    branches: [ main ]
    paths-ignore: ['README.md']
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write

# --- CONCURRENCY CONTROL ---
# Cancels any currently running jobs for this branch if a new push arrives.
# This prevents race conditions and merge conflicts on the README.
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install pyyaml
      - name: Run script
        run: python script/update_readme.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}