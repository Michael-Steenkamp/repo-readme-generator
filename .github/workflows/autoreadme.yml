name: Test AutoReadme Action
on:
  push:
    branches: [ main ]
    paths-ignore: ['README.md']
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-local-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 
          
      - name: Run AutoReadme AI Action
        # The './' tells GitHub to look for action.yml in the root of the CURRENT repo
        uses: ./ 
        with:
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}