name: 'AutoReadme AI'
description: 'Keep your documentation perfectly in sync with your codebase, without the developer friction.'
author: 'Michael Steenkamp'

# These dictate how it looks in the Marketplace
branding:
  icon: 'book-open'
  color: 'blue'

inputs:
  gemini-api-key:
    description: 'API key for Gemini (Fast routing)'
    required: false
  openai-api-key:
    description: 'API key for OpenAI (Heavy routing)'
    required: false
  anthropic-api-key:
    description: 'API key for Anthropic'
    required: false
  github-token:
    description: 'GitHub token for creating the Pull Request'
    required: true
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      shell: bash
      # Installing pyyaml to support your custom routing config
      run: pip install pyyaml 
      
    - name: Run AutoReadme AI Engine
      shell: bash
      # github.action_path ensures the runner finds your script inside the action's directory
      run: python ${{ github.action_path }}/script/update_readme.py
      env:
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ inputs.github-token }}
        commit-message: "docs(ai): auto-update README"
        title: "🤖 AI Documentation Update"
        body: |
          This is an automated Pull Request generated by AutoReadme AI.
          The system detected new code pushes and dynamically updated the `README.md`.
        branch: "ai-docs-update"
        delete-branch: true